<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Paranoid Remake</title>
  <link rel="stylesheet" href="styles.css" />
</head>
<body>
  <div class="bg-layer"></div>
  <div class="app">
    <header class="hud" aria-live="polite">
      <div class="hud-item"><span class="label">Score</span><span id="score">0</span></div>
      <div class="hud-item"><span class="label">Lives</span><span id="lives">3</span></div>
      <div class="hud-item"><span class="label">Level</span><span id="level">1</span></div>
      <div class="hud-item"><span class="label">State</span><span id="state">Ready</span></div>
    </header>

    <main class="game-shell">
      <canvas id="gameCanvas" width="960" height="540" aria-label="Paranoid brick breaker game area"></canvas>

      <section id="overlay" class="overlay show" role="dialog" aria-modal="true">
        <h1 id="overlayTitle">PARANOID</h1>
        <p id="overlayText">A browser remake of the MS-DOS-style classic.<br />Use ← / → to move and SPACE to launch.</p>
        <button id="overlayButton" type="button">Start Game</button>
      </section>
    </main>

    <footer class="controls-note">
      <p><strong>Controls:</strong> Left / Right Arrow = Move, Space = Launch or Restart, P = Pause</p>
    </footer>
  </div>

  <!-- Cache-busting query keeps the latest renderer from being served stale by aggressive browser cache. -->
  <script src="game.js?v=brick-shine-2"></script>
</body>
</html>
